services:
  - type: web
    name: minichain-server
    env: rust
    region: oregon
    buildCommand: cargo build --release
    startCommand: target/release/minichain-server --data-dir /var/data --port $PORT
    envVars:
      - key: RUST_BACKTRACE
        value: "1"
    disks:
      - name: minichain-data
        mountPath: /var/data
        sizeGB: 1
